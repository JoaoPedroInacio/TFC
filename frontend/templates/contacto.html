<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Autogémeos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0A0A0A; color: white; font-family: 'Inter', sans-serif; }
        .accent-color { color: #F06418; }
        .bg-accent { background-color: #F06418; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 glass fixed w-full z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase italic">Auto<span class="accent-color">Gémeos</span></a>
        </div>
        <div class="hidden md:flex gap-8 text-gray-400 font-medium">
            <a href="index.html" class="hover:text-white transition">Início</a>
            <a href="index.html#stock" class="hover:text-white transition">Veículos</a>
            <a href="contacto.html" class="text-white">Contacto</a>
        </div>
        <a href="index.html#stock" class="bg-accent text-white px-6 py-2 rounded-lg font-bold hover:opacity-90 transition">Ver Stock</a>
    </nav>

    <section class="pt-32 pb-20 px-6 md:px-12">
        <div class="max-w-6xl mx-auto">
            <div class="grid md:grid-cols-2 gap-16">
                
                <div>
                    <h1 class="text-5xl font-bold mb-6 italic">Pronto para Encontrar o Seu <span class="accent-color">Veículo Ideal?</span></h1>
                    <p class="text-gray-400 text-lg mb-10">A nossa equipa está disponível para o ajudar. Entre em contacto connosco e comece a sua jornada hoje.</p>
                    
                    <div class="space-y-6">
                        <div class="bg-[#111] p-6 rounded-2xl border border-white/5">
                            <p class="text-gray-500 text-xs uppercase font-bold mb-1">Localização</p>
                            <p class="text-xl">Av. da Liberdade, 245, Lisboa</p>
                        </div>
                        <div class="flex gap-4">
                            <div class="bg-[#111] p-6 rounded-2xl border border-white/5 flex-1">
                                <p class="text-gray-500 text-xs uppercase font-bold mb-1">Telefone</p>
                                <p class="text-xl">+351 210 000 000</p>
                            </div>
                            <div class="bg-[#111] p-6 rounded-2xl border border-white/5 flex-1">
                                <p class="text-gray-500 text-xs uppercase font-bold mb-1">Horário</p>
                                <p class="text-xl">09:00 - 19:00</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-[#111] p-8 md:p-10 rounded-3xl border border-white/5">
                    <form id="contact-form" class="space-y-4">
                        <div class="grid md:grid-cols-2 gap-4">
                            <input type="text" name="nome" placeholder="Nome Completo" required class="w-full bg-black border border-white/10 rounded-xl p-4 outline-none focus:border-accent">
                            <input type="email" name="email" placeholder="E-mail" required class="w-full bg-black border border-white/10 rounded-xl p-4 outline-none focus:border-accent">
                        </div>
                        <input type="text" name="assunto" placeholder="Assunto (Ex: Interesse no BMW M4)" class="w-full bg-black border border-white/10 rounded-xl p-4 outline-none focus:border-accent">
                        <textarea name="mensagem" rows="5" placeholder="A sua mensagem..." required class="w-full bg-black border border-white/10 rounded-xl p-4 outline-none focus:border-accent"></textarea>
                        
                        <button type="submit" class="w-full bg-accent text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg hover:shadow-orange-900/20 transition-all">
                            Enviar Mensagem →
                        </button>
                    </form>
                    <div id="form-status" class="mt-4 text-center hidden"></div>
                </div>

            </div>
        </div>
    </section>

    <script>
        // Simulação de ligação ao Backend
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('form-status');
            status.classList.remove('hidden');
            status.innerHTML = "A enviar...";
            
            // Aqui o backend entraria em ação
            setTimeout(() => {
                status.innerHTML = "<span class='text-green-500'>Mensagem enviada com sucesso! Entraremos em contacto brevemente.</span>";
                this.reset();
            }, 1500);
        });
    </script>
</body>
</html>
