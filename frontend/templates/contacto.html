<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Autogémeos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Inter', sans-serif; }
        .accent-color { color: #F06418; }
        .bg-accent { background-color: #F06418; }
        .glass { background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center px-6 md:px-12 py-5 glass fixed w-full z-50 border-b border-white/[0.06]">
        <div class="flex items-center gap-2">
            <a href="/" class="text-2xl font-black tracking-tighter uppercase italic">Auto<span class="accent-color">Gémeos</span></a>
        </div>
        <div class="hidden md:flex gap-8 text-sm text-gray-400 font-medium tracking-wide">
           <a href="/" class="hover:text-white transition">Início</a>
<a href="/veiculos/" class="hover:text-white transition">Veículos</a>
<a href="/sobre/" class="hover:text-white transition">Sobre Nós</a>
<a href="/contacto/" class="text-white border-b-2 border-accent pb-1 transition">Contacto</a>
        </div>
    </nav>

    <section class="pt-40 pb-24 px-6 md:px-12 max-w-6xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-16 items-center">
            <div>
                <span class="text-xs font-bold uppercase tracking-widest accent-color">Canais de Apoio</span>
                <h1 class="text-4xl md:text-5xl font-black italic uppercase tracking-tight mt-2 mb-4">Fale com a nossa <br><span class="accent-color">Equipa</span></h1>
                <p class="text-gray-400 text-base font-light">Estamos inteiramente à sua disposição para agendamentos ou dúvidas comerciais.</p>
            </div>

            <div class="bg-[#111111] p-8 md:p-10 rounded-2xl border border-white/[0.05]">
                <form id="contact-form" class="space-y-4">
                    <input type="text" placeholder="Nome Completo" required class="w-full bg-black border border-white/[0.08] rounded-xl p-4 text-sm outline-none focus:border-accent text-white">
                    <textarea rows="4" placeholder="Escreva a sua mensagem..." required class="w-full bg-black border border-white/[0.08] rounded-xl p-4 text-sm outline-none focus:border-accent text-white resize-none"></textarea>
                    <button type="submit" class="w-full bg-accent text-white py-4 rounded-xl font-bold text-sm uppercase tracking-wider hover:bg-opacity-90 transition">Enviar Mensagem Privada</button>
                </form>
                <div id="form-status" class="mt-4 text-center text-xs font-semibold hidden text-green-500">✓ Mensagem enviada com sucesso!</div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('form-status').classList.remove('hidden');
            this.reset();
        });
    </script>
</body>
</html>
